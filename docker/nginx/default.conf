# W0 spike — 同網域反代（AR9）
# /api → php-fpm:9000（透過 fastcgi_pass）
# /     → node:5173（Vite dev server）
# /ws   → node:5173 with WebSocket upgrade（Vite HMR）

upstream vite_dev {
    server node:5173;
}

server {
    listen 80;
    server_name localhost;

    # Laravel public/index.php 入口（透過 backend 容器內的 PHP-FPM）
    root /var/www/backend/public;
    index index.php;

    client_max_body_size 20m;

    # ---- API: forward to PHP-FPM ----
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP 處理
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # ---- Vite HMR WebSocket ----
    location /ws {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ---- Vite assets / SPA fallback ----
    location / {
        proxy_pass http://vite_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 不要把 WS 切回 polling
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
